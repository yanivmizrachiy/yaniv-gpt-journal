name: pages smoke check

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          test -f index.html
          test -f RULES.md
          test -f README.md
          test -f TESTING_CHECKLIST.md
          grep -q "העתק לדף עבודה כתמונה" index.html
          grep -q "אין דמו" RULES.md
